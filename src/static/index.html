<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-actions">
        <button id="teacher-login-toggle" class="icon-button" type="button" aria-label="Teacher login">👤</button>
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <p id="teacher-status" class="teacher-status">Teacher mode: off</p>
      <div id="login-modal" class="modal hidden">
        <div class="modal-content">
          <h3>Teacher Login</h3>
          <form id="login-form">
            <div class="form-group">
              <label for="username">Username:</label>
              <input id="username" name="username" required />
            </div>
            <div class="form-group">
              <label for="password">Password:</label>
              <input id="password" name="password" type="password" required />
            </div>
            <button type="submit">Log In</button>
          </form>
          <div id="login-message" class="message hidden"></div>
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Manage Activity Registrations</h3>
        <p id="teacher-hint" class="teacher-hint">Sign in as a teacher to register or remove students.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
